root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = [
    "--port",
    "3000",
    "--basepath",
    "./internal/core",
    "--hostname",
    "0.0.0.0"
  ]
  bin = "./tmp/app.dev"
  cmd = "go build -o ./tmp/app.dev ./cmd/core/server/main.go"
  delay = 0
  exclude_dir = [
    "testdata",
    ".vscode",
    ".github",
    "caddy",
    "doc",
    "frontend",
    "litestream",
    "tmp",
    "upload"
  ]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
