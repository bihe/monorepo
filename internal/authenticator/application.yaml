---
baseconfig:
    ## common application properties
    appName: authenticator-gokit
    hostID: authenticator
    environment: Development
    errorPath: /error

    # static assets
    assets:
        assetDir: "./assets"
        assetPrefix: "/assets"

    # allow cross-origin requests
    cors:
        origins:
        - "http://localhost:8080"
        - "http://localhost:3000"
        - "http://localhost:4200"
        methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"
        headers:
        - "cache-control"
        - "content-type"
        - "pragma"
        - "accept"
        - "authorization"
        credentials: true
        maxAge: 500

    # log settings
    logging:
        filePath: "./logs/authenticator.log"
        logLevel: debug
        grayLogServer: ""

    # cookies are needed for user-facing sites and messaging
    cookies:
        domain: localhost
        path: "/"
        secure: false
        prefix: authenticator

database:
    connectionString: "root:mariadb@tcp(db:3306)/login?parseTime=true"

# configuration for JWT authentication
security:
    jwtIssuer: issuer
    jwtSecret: secret
    cookieName: login_token
    expiry: 7
    cookieDomain: localhost
    cookiePath: /
    cookieSecure: false
    claim:
        name: login
        url: http://localhost:3001
        roles:
        - User
    cacheDuration: 10m
    loginRedirect: /

oidc:
  clientID: clientID
  clientSecret: clientSecret
  redirectURL: "http://localhost:3001/signin-oidc"
  provider: "https://accounts.google.com"
