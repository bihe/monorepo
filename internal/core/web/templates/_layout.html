<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" id="site-favicon" type="image/x-icon" href="/assets/folder.svg">
    <title>{{template "title" .}}</title>
    <link href="/assets/bootstrap/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM">
    <link href="/assets/css/styles.css" rel="stylesheet">
    <link href="/assets/fonts/local.css" rel="stylesheet">
    <link href="/assets/bootstrap-icons/bootstrap-icons.min.css" rel="stylesheet">
  </head>
  <body>
<!-- data-bs-theme="dark" -->
    <header >
      <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="/ui"><i class="bi-house-heart"></i></a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
              <li class="nav-item">
                <a class='nav-link {{ .IsActive "/ui/bookmarks" }}' href="/ui/bookmarks"><i class="bi-bookmark-star"></i> Bookmarks</a>
              </li>
              <li class="nav-item">
                <a class='nav-link {{ .IsActive "/ui/mydms" }}' href="/ui/mydms"><i class="bi-file-earmark-pdf"></i> Documents</a>
              </li>
              <li class="nav-item">
                <a class='nav-link {{ .IsActive "/ui/sites" }}' href="/ui/sites"><i class="bi-shield-check"></i> Sites</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
              <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            &nbsp;
            <span class="badge d-flex align-items-center p-1 pe-2 text-dark-emphasis bg-light-subtle border border-dark-subtle rounded-pill">
              <img class="rounded-circle me-1" width="24" height="24" src="{{ .User.ProfileURL}}" alt="">{{ .User.DisplayName}}
            </span>

          </div>
        </div>
      </nav>
    </header>

    <main>
      <div class="container">
        <!-- content goes here-->
        {{block "content" .}}{{end}}
        <!-- /content -->
      </div>
    </main>

    <script src="/assets/bootstrap/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"></script>
  </body>
</html>
