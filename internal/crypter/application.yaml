---
baseconfig:
    ## common application properties
    appName: crypter
    hostID: localhost-dev
    environment: Development

    logging:
        filePath: "../../../_logs/crypter-grpc-api.log"
        logLevel: debug
        grayLogServer: ""

tokenSecurity:
    jwtIssuer: issuer
    jwtSecret: secret
    claim:
        name: crypter
        url: http://localhost:3004
        roles:
        - User
    cacheDuration: 10m

